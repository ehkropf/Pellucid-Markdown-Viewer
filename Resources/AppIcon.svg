<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Icon background gradient (teal/green) -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>

    <!-- Subtle inner shadow for depth -->
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>

    <!-- Drop shadow for magnifying glass -->
    <filter id="glassShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <!-- Subtle shadow for the text -->
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#064E3B" flood-opacity="0.3"/>
    </filter>

    <!-- Glass lens gradient (very light teal tint, minimal frost) -->
    <radialGradient id="lensGrad" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#F0FAF8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E0F2EF" stop-opacity="0.18"/>
    </radialGradient>

    <!-- Lens rim gradient (silver/teal metallic) -->
    <linearGradient id="rimGrad" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#E0E7E6"/>
      <stop offset="30%" stop-color="#A8B5B3"/>
      <stop offset="60%" stop-color="#7A8C89"/>
      <stop offset="100%" stop-color="#4A5F5C"/>
    </linearGradient>

    <!-- Handle gradient -->
    <linearGradient id="handleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9AADAB"/>
      <stop offset="50%" stop-color="#6B807D"/>
      <stop offset="100%" stop-color="#3D5553"/>
    </linearGradient>

    <!-- M↓ text color gradient (white for contrast on teal) -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0F2F1"/>
    </linearGradient>

    <!-- Magnified text inside lens (white, matching the text behind) -->
    <linearGradient id="magTextGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0F2F1"/>
    </linearGradient>

    <!-- Clip for lens content -->
    <clipPath id="lensClip">
      <circle cx="550" cy="390" r="227"/>
    </clipPath>

    <!-- Lens reflection -->
    <linearGradient id="reflectionGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- === BACKGROUND === -->
  <!-- macOS squircle — fill full canvas, system applies its own mask -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"
        fill="url(#bgGrad)" stroke="#0D9488" stroke-width="1.5"/>

  <!-- Subtle top highlight -->
  <rect x="2" y="2" width="1020" height="510" rx="227" ry="227"
        fill="url(#reflectionGrad)" opacity="0.35"/>

  <!-- === M↓ TEXT (behind the glass) === -->
  <g filter="url(#textShadow)">
    <!-- The "M" — large, filling left-center -->
    <text x="80" y="770" font-family="SF Pro Display, Helvetica Neue, Helvetica, Arial, sans-serif"
          font-weight="800" font-size="780" fill="url(#textGrad)" letter-spacing="-15">M</text>
    <!-- The "↓" arrow — prominent, right of M -->
    <text x="640" y="790" font-family="SF Pro Display, Helvetica Neue, Helvetica, Arial, sans-serif"
          font-weight="400" font-size="610" fill="url(#textGrad)" opacity="0.85">↓</text>
  </g>

  <!-- === MAGNIFYING GLASS === -->
  <g filter="url(#glassShadow)">
    <!-- Handle -->
    <line x1="700" y1="545" x2="880" y2="730"
          stroke="url(#handleGrad)" stroke-width="56" stroke-linecap="round"/>
    <!-- Handle highlight -->
    <line x1="704" y1="541" x2="876" y2="722"
          stroke="#B8C9C7" stroke-width="8" stroke-linecap="round" opacity="0.4"/>

    <!-- Lens rim (outer) -->
    <circle cx="550" cy="390" r="250" fill="none"
            stroke="url(#rimGrad)" stroke-width="30"/>
    <!-- Rim highlight -->
    <circle cx="550" cy="390" r="264" fill="none"
            stroke="#C5D5D3" stroke-width="2" opacity="0.6"/>

    <!-- Lens glass -->
    <circle cx="550" cy="390" r="227" fill="url(#lensGrad)"/>

    <!-- Magnified content inside lens — shows enlarged portion of M↓ -->
    <g clip-path="url(#lensClip)">
      <!-- Opaque background to block original text showing through -->
      <circle cx="550" cy="390" r="227" fill="url(#bgGrad)"/>
      <!-- Magnified M — shifted to show right side of M and left of arrow -->
      <text x="80" y="690" font-family="SF Pro Display, Helvetica Neue, Helvetica, Arial, sans-serif"
            font-weight="800" font-size="930" fill="url(#magTextGrad)" letter-spacing="-18">M</text>
      <text x="630" y="710" font-family="SF Pro Display, Helvetica Neue, Helvetica, Arial, sans-serif"
            font-weight="400" font-size="725" fill="url(#magTextGrad)">↓</text>
    </g>

    <!-- Glass reflection (arc highlight) -->
    <ellipse cx="510" cy="325" rx="135" ry="92"
             fill="url(#reflectionGrad)" opacity="0.5"
             transform="rotate(-15, 510, 325)"/>

    <!-- Small specular highlight -->
    <circle cx="475" cy="300" r="19" fill="white" opacity="0.6"/>
  </g>
</svg>